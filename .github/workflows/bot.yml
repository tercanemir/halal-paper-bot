name: Halal paper bot daily tick

on:
  schedule:
    # 21:30 UTC weekdays = ~30 min after US market close (4:30 PM ET)
    - cron: "30 21 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write   # needed to commit updated trades.csv / positions.json back

concurrency:
  group: paper-bot
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run tick
        run: python tick.py

      - name: Commit state changes
        run: |
          git config user.name  "halal-paper-bot"
          git config user.email "halal-paper-bot@users.noreply.github.com"
          git add -A data/
          if git diff --cached --quiet; then
            echo "No state changes"
          else
            git commit -m "chore: daily tick $(date -u +%Y-%m-%d)"
            git push origin HEAD:${{ github.ref_name }}
          fi
